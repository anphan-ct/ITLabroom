name: it_lab_room

services:
  # Laravel PHP-FPM application (development)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: itlab
        uid: 1000
    container_name: it_lab_room_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./BE_it-lab-room:/var/www/html
      - it_lab_room_composer_cache:/tmp/composer-cache
    environment:
      APP_NAME: IT_lab_room
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: it_lab_room
      DB_USERNAME: it_lab_room
      DB_PASSWORD: it_lab_room_password
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - it_lab_room_network

  # Nginx reverse proxy for Laravel backend
  nginx:
    image: nginx:1.27-alpine
    container_name: it_lab_room_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
      - "8080:80"
    volumes:
      - ./BE_it-lab-room:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - it_lab_room_network

  # Vite React frontend (development)
  frontend:
    image: node:22-alpine
    container_name: it_lab_room_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./FE_it-lab-room:/app
      - it_lab_room_frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      VITE_APP_NAME: IT_lab_room
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://nginx
    depends_on:
      - nginx
    networks:
      - it_lab_room_network

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: it_lab_room_mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: it_lab_room
      MYSQL_USER: it_lab_room
      MYSQL_PASSWORD: it_lab_room_password
      MYSQL_ROOT_PASSWORD: root_password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - it_lab_room_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - it_lab_room_network

  # phpMyAdmin for MySQL administration
  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: it_lab_room_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: it_lab_room
      PMA_PASSWORD: it_lab_room_password
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - it_lab_room_network

  # Redis cache/queue
  redis:
    image: redis:7-alpine
    container_name: it_lab_room_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - it_lab_room_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - it_lab_room_network

networks:
  it_lab_room_network:
    name: it_lab_room_network
    driver: bridge

volumes:
  it_lab_room_mysql_data:
    name: it_lab_room_mysql_data
  it_lab_room_redis_data:
    name: it_lab_room_redis_data
  it_lab_room_composer_cache:
    name: it_lab_room_composer_cache
  it_lab_room_frontend_node_modules:
    name: it_lab_room_frontend_node_modules
